<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="НМТ Квіз — Мультиплеєр">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="НМТ Квіз">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>НМТ Квіз</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // iOS Safari: bridge visual viewport changes to Flutter layout.
    // iOS Safari does not support the interactive-widget viewport property, so
    // MediaQuery.viewInsets.bottom stays 0 when the keyboard appears. This
    // listener detects the visual-viewport shrink caused by the keyboard and
    // resizes the Flutter canvas to match, causing Flutter to recalculate its
    // layout metrics and correctly report viewInsets.bottom.
    (function () {
      if (!window.visualViewport) return;

      function syncFlutterViewport() {
        var vvHeight = window.visualViewport.height;
        var vvTop    = window.visualViewport.offsetTop;
        var el = document.querySelector('flt-glass-pane');
        if (!el) return;
        el.style.position = 'absolute';
        el.style.top      = vvTop + 'px';
        el.style.height   = vvHeight + 'px';
      }

      window.visualViewport.addEventListener('resize', syncFlutterViewport);
      window.visualViewport.addEventListener('scroll', syncFlutterViewport);
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07070f;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    /* ── LOADER SHELL ── */
    #cyber-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #07070f;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #cyber-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* ── SCANLINES ── */
    #cyber-loader::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 200, 0.015) 2px,
        rgba(0, 255, 200, 0.015) 4px
      );
      pointer-events: none;
      animation: scanMove 8s linear infinite;
    }

    /* ── GRID FLOOR ── */
    #cyber-loader::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -50%;
      width: 200%;
      height: 50%;
      background-image:
        linear-gradient(rgba(0,255,200,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(400px) rotateX(60deg);
      transform-origin: bottom center;
      animation: gridPulse 3s ease-in-out infinite;
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: relative;
      text-align: center;
      margin-bottom: 48px;
    }
    .logo-main {
      font-size: clamp(36px, 10vw, 72px);
      font-weight: 900;
      letter-spacing: 6px;
      color: #00ffe0;
      text-shadow:
        0 0 8px #00ffe0,
        0 0 24px #00ffe0,
        0 0 60px rgba(0,255,224,0.4);
      animation: glitchMain 4s infinite;
      user-select: none;
    }
    .logo-sub {
      font-size: clamp(11px, 2.5vw, 14px);
      letter-spacing: 10px;
      color: #ff2d78;
      text-shadow: 0 0 10px #ff2d78;
      margin-top: 6px;
      text-transform: uppercase;
      animation: flicker 6s infinite;
    }

    /* glitch copies */
    .logo-main::before,
    .logo-main::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0; right: 0;
      overflow: hidden;
    }
    .logo-main::before {
      color: #ff2d78;
      text-shadow: -3px 0 #ff2d78;
      clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
      animation: glitchTop 4s infinite;
    }
    .logo-main::after {
      color: #00b8ff;
      text-shadow: 3px 0 #00b8ff;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      animation: glitchBot 4s infinite;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      width: min(320px, 80vw);
      margin-bottom: 28px;
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(0,255,224,0.1);
      border: 1px solid rgba(0,255,224,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffe0, #ff2d78, #00b8ff);
      background-size: 200%;
      border-radius: 2px;
      animation: progressAnim 28s cubic-bezier(.1,.6,.4,1) forwards,
                 gradientShift 2s linear infinite;
      box-shadow: 0 0 12px #00ffe0;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0,255,224,0.5);
    }
    .progress-pct {
      color: #00ffe0;
      text-shadow: 0 0 6px #00ffe0;
    }

    /* ── STATUS TEXT ── */
    .status-text {
      font-size: clamp(12px, 3vw, 15px);
      color: rgba(0,255,224,0.8);
      letter-spacing: 2px;
      text-align: center;
      padding: 0 24px;
      min-height: 2em;
      text-shadow: 0 0 8px rgba(0,255,224,0.4);
      animation: fadeStatus 0.4s ease;
    }

    /* ── CORNER DECORATIONS ── */
    .corner { position: absolute; width: 24px; height: 24px; }
    .corner-tl { top: 20px; left: 20px; border-top: 2px solid #00ffe0; border-left: 2px solid #00ffe0; }
    .corner-tr { top: 20px; right: 20px; border-top: 2px solid #ff2d78; border-right: 2px solid #ff2d78; }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid #ff2d78; border-left: 2px solid #ff2d78; }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid #00ffe0; border-right: 2px solid #00ffe0; }
    .corner::before {
      content: '';
      position: absolute;
      background: inherit;
      border-color: inherit;
    }

    /* ── PARTICLES ── */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px;
      border-radius: 1px;
      animation: particleFall linear infinite;
      opacity: 0;
    }

    /* ── DATA STREAMS ── */
    .data-stream {
      position: absolute;
      top: 0;
      width: 1px;
      height: 100%;
      overflow: hidden;
      opacity: 0.15;
    }
    .data-stream span {
      display: block;
      font-size: 10px;
      color: #00ffe0;
      line-height: 14px;
      animation: streamFall linear infinite;
      white-space: nowrap;
      writing-mode: vertical-rl;
      letter-spacing: 2px;
    }

    /* ── KEYFRAMES ── */
    @keyframes scanMove {
      from { background-position: 0 0; }
      to   { background-position: 0 100vh; }
    }
    @keyframes gridPulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }
    @keyframes glitchMain {
      0%, 90%, 100% { transform: none; }
      91%  { transform: skewX(-2deg) translateX(3px); }
      92%  { transform: skewX(1deg) translateX(-3px); }
      93%  { transform: none; }
      96%  { transform: skewX(-1deg) translateX(2px); }
      97%  { transform: none; }
    }
    @keyframes glitchTop {
      0%, 90%, 100% { transform: none; opacity: 0; }
      91% { transform: translateX(-4px); opacity: 0.8; }
      92% { transform: translateX(4px);  opacity: 0; }
    }
    @keyframes glitchBot {
      0%, 88%, 100% { transform: none; opacity: 0; }
      89% { transform: translateX(5px);  opacity: 0.7; }
      90% { transform: translateX(-5px); opacity: 0; }
    }
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.2; }
      97% { opacity: 1; }
      98% { opacity: 0.5; }
      99% { opacity: 1; }
    }
    @keyframes progressAnim {
      0%   { width: 0%; }
      5%   { width: 8%; }
      15%  { width: 22%; }
      30%  { width: 41%; }
      50%  { width: 58%; }
      70%  { width: 73%; }
      85%  { width: 85%; }
      95%  { width: 93%; }
      100% { width: 98%; }
    }
    @keyframes gradientShift {
      from { background-position: 0% 0%; }
      to   { background-position: 200% 0%; }
    }
    @keyframes fadeStatus {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes particleFall {
      0%   { transform: translateY(-10px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
    @keyframes streamFall {
      from { transform: translateY(-100%); }
      to   { transform: translateY(100vh); }
    }
  </style>
</head>
<body>

  <!-- ═══════════════ CYBERPUNK LOADER ═══════════════ -->
  <div id="cyber-loader">

    <!-- corner brackets -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- matrix data streams -->
    <div class="particles" id="particles"></div>

    <!-- logo -->
    <div class="logo-wrap">
      <div class="logo-main" data-text="НМТ КВІЗ">НМТ КВІЗ</div>
      <div class="logo-sub">МУЛЬТИПЛЕЄР · БОЙОВИЙ РЕЖИМ</div>
    </div>

    <!-- progress -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label">
        <span>ЗАВАНТАЖЕННЯ</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
    </div>

    <!-- rotating status message -->
    <div class="status-text" id="status-text">Ініціалізація нейронів...</div>

  </div>
  <!-- ═══════════════════════════════════════════════ -->

  <script>
    (function () {
      /* ── funny Ukrainian loading messages ── */
      const msgs = [
        "Ініціалізація нейронів...",
        "Завантажуємо 3595 питань-катувань...",
        "НМТ не страшний — страшний недосип 💀",
        "Синхронізуємо ваш мозок із сервером...",
        "Твій конкурент зараз спить. Дій! 😤",
        "Запускаємо бойовий режим підготовки...",
        "Чай залито. Мозок розморожується ☕",
        "Перевіряємо, чи вивчили ви математику...",
        "Вантажимо знання прямо з хмари... ☁️",
        "Будь ласка, не панікуй. Ми майже готові.",
        "Оптимізуємо алгоритм вашої удачі...",
        "З'єднуємося з паралельним всесвітом, де ти вже здав НМТ ✨",
        "Обробляємо екзаменаційні травми...",
        "Активуємо режим 'Зубрилки-Про'...",
        "Майже! (Ні, насправді майже) 🤞",
      ];

      let msgIdx = 0;
      const statusEl = document.getElementById('status-text');
      const pctEl    = document.getElementById('progress-pct');
      const fillEl   = document.getElementById('progress-fill');

      function nextMsg() {
        msgIdx = (msgIdx + 1) % msgs.length;
        statusEl.style.animation = 'none';
        void statusEl.offsetWidth; // reflow
        statusEl.style.animation = 'fadeStatus 0.4s ease';
        statusEl.textContent = msgs[msgIdx];
      }

      // rotate messages every 2.2 s
      const msgTimer = setInterval(nextMsg, 2200);

      // sync percentage label with CSS animation progress
      const startTime = Date.now();
      const totalMs   = 28000; // matches progressAnim duration
      // mimic the same cubic-bezier stops roughly
      function easeProgress(t) {
        // simple approximation of the keyframe curve
        if (t < 0.05)  return t * 1.6;
        if (t < 0.5)   return 0.08 + (t - 0.05) * 1.1;
        if (t < 0.85)  return 0.58 + (t - 0.5)  * 0.43;
        if (t < 0.95)  return 0.73 + (t - 0.85) * 1.2;
        return Math.min(0.98, 0.85 + (t - 0.85) * 0.87);
      }
      const pctTimer = setInterval(function () {
        const t = Math.min(1, (Date.now() - startTime) / totalMs);
        const pct = Math.round(easeProgress(t) * 100);
        pctEl.textContent = pct + '%';
      }, 200);

      /* ── generate falling particles ── */
      const container = document.getElementById('particles');
      const chars = '01アイウエオカキクケコ▲▼◆░▓';
      for (let i = 0; i < 18; i++) {
        const s = document.createElement('div');
        s.className = 'data-stream';
        s.style.left = (Math.random() * 100) + '%';
        s.style.opacity = (0.05 + Math.random() * 0.12).toString();
        const inner = document.createElement('span');
        let txt = '';
        for (let j = 0; j < 40; j++) txt += chars[Math.floor(Math.random() * chars.length)] + '\n';
        inner.textContent = txt;
        const dur = (6 + Math.random() * 10).toFixed(1) + 's';
        const delay = (Math.random() * -8).toFixed(1) + 's';
        inner.style.animation = `streamFall ${dur} ${delay} linear infinite`;
        s.appendChild(inner);
        container.appendChild(s);
      }

      /* ── hide loader when Flutter first frame renders ── */
      window.addEventListener('flutter-first-frame', function () {
        clearInterval(msgTimer);
        clearInterval(pctTimer);
        // snap bar to 100%
        fillEl.style.animation = 'none';
        fillEl.style.width = '100%';
        pctEl.textContent = '100%';
        statusEl.textContent = 'Поїхали! 🚀';

        setTimeout(function () {
          const loader = document.getElementById('cyber-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function () { loader.remove(); }, 700);
          }
        }, 300);
      });
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
